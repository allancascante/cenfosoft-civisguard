name: Build docs PDF (arc42 consolidated)

# Dispara cuando cambia algo en docs/ (excepto el PDF autogenerado),
# el script de consolidacion o el propio workflow.
# El bucle infinito se previene con dos mecanismos:
#   1. El job solo corre si el actor NO es el bot de GitHub Actions.
#   2. El commit del bot incluye [skip ci] en el mensaje.
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "scripts/build_docs_pdf.py"
      - ".github/workflows/docs-pdf.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "scripts/build_docs_pdf.py"
      - ".github/workflows/docs-pdf.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pdf:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Quarto + TinyTeX
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Build consolidated QMD
        run: python scripts/build_docs_pdf.py

      - name: Render PDF
        run: |
          cd docs
          quarto render consolidado.qmd --to pdf
          mv consolidado.pdf consolidado-docs.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: consolidado-docs-pdf
          path: docs/consolidado-docs.pdf
          retention-days: 30

      - name: Commit PDF and QMD to main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/consolidado-docs.pdf docs/consolidado.qmd
          if git diff --staged --quiet; then
            echo "Sin cambios en el PDF consolidado."
          else
            git commit -m "docs: actualizar PDF consolidado [skip ci]"
            git push
          fi
