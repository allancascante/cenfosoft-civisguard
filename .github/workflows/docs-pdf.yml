name: Build docs PDF (arc42 consolidated)

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "scripts/build_docs_pdf.py"
      - ".github/workflows/docs-pdf.yml"
  pull_request:
    paths:
      - "docs/**"
      - "scripts/build_docs_pdf.py"
      - ".github/workflows/docs-pdf.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pdf:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Quarto + TinyTeX
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Build consolidated QMD
        run: python scripts/build_docs_pdf.py

      - name: Render PDF
        run: cd docs && quarto render consolidado.qmd --to pdf && mv consolidado.pdf consolidado-docs.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: consolidado-docs-pdf
          path: docs/consolidado-docs.pdf

      - name: Commit PDF (only on push to main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/consolidado-docs.pdf
          if git diff --staged --quiet; then
            echo "No changes in PDF."
          else
            git commit -m "docs: actualizar PDF consolidado [skip ci]"
            git push
          fi
